<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Studyplanner</title>
    
    <link rel="manifest" href="/Studyplanner/meta/manifest.json">
    <link rel="icon" href="/Studyplanner/meta/icons/icon.ico">
    <link rel="stylesheet" href="src/css/style-basic.css">
    <link rel="stylesheet" href="src/css/style.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400..700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400..700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
</head>

<body>
    <!----- メインコンテナ ----->
    <main id="wrapper" class="main-wrapper">
        <div id="material-container" class="display-container scrollable hidden">
            <!-- タイトル -->
            <div class="header">
                <h1>教材一覧</h1>
            </div>

            <!-- 検索ツールバー -->
            <div class="filter-toolbar">
                <div class="search-box">
                    <input type="text" id="search-material-input" placeholder="教材名またはキーワードを検索...">
                </div>
                <div class="filter-group">
                    <!-- 教科フィルタ -->
                    <div class="filter-btn-wrapper">
                        <i class="fa-solid fa-book"></i>
                        <select id="filter-subject-select">
                            <option value="all">全教科</option>
                            <option value="math">数学</option>
                            <option value="english">英語</option>
                            <option value="modernjp">現代文</option>
                            <option value="classicjp">古典</option>
                            <option value="science">理科</option>
                            <option value="social">社会</option>
                            <option value="others">その他</option>
                        </select>
                    </div>

                    <!-- 状態フィルタ -->
                    <div class="filter-btn-wrapper">
                        <i class="fa-solid fa-bars-progress"></i>
                        <select id="filter-status-select">
                            <option value="all">全状態</option>
                            <option value="waiting">未着手</option>
                            <option value="planning">進行中</option>
                            <option value="learning">学習中</option>
                            <option value="completed">完了</option>
                        </select>
                    </div>

                    <!-- カテゴリフィルタ -->
                    <div class="filter-btn-wrapper">
                        <i class="fa-solid fa-tag"></i>
                        <select id="filter-category-select">
                            <!-- カテゴリが挿入される -->
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 教材一覧 -->
            <div class="separated-wrapper">
                <div id="material-items"></div>
            </div>

            <!-- ユーティリティボタン -->
            <div class="util-btn-wrapper">
                <button id="add-material-btn" class="util-btn">
                    <i class="fa-solid fa-plus"></i> 教材追加
                </button>
                <button id="sort-material-btn" class="util-btn">
                    <i class="fa-solid fa-up-down"></i> 教材並び替え
                </button>
            </div>
        </div>
        <div id="plan-container" class="display-container scrollable">
            <!-- タイトル -->
            <div class="header">
                <h1>今日の学習計画</h1>
                <p id="todaydate-panel"></p>
            </div>

            <!-- 予定一覧 -->
            <div class="separated-wrapper">
                <div id="plan-items"></div>
            </div>

            <!-- ユーティリティボタン -->
            <div class="util-btn-wrapper">
                <!-- <button id="bulk-add-btn" class="util-btn">
                    <i class="fa-solid fa-plus"></i> まとめて追加
                </button> -->
                <button id="shift-date-btn" class="util-btn">
                    <i class="fa-regular fa-calendar-days"></i> 日付変更
                </button>
            </div>
        </div>
        <div id="option-container" class="display-container scrollable hidden">
            <!-- タイトル -->
            <div class="header">
                <h1>オプション・その他の操作</h1>
            </div>

            <!-- ユーティリティボタン -->
            <h3>カテゴリーの管理</h3>
            <div class="util-btn-wrapper">
                <button id="open-category-manage-btn" class="util-btn">
                    <i class="fa-solid fa-tags"></i> カテゴリーの追加・編集
                </button>
            </div>

            <h3>オフラインで保存</h3>
            <div class="util-btn-wrapper">
                <button id="import-json-btn" class="util-btn">
                    <i class="fa-solid fa-file-import"></i> JSON形式でインポート
                </button>
                <button id="export-json-btn" class="util-btn">
                    <i class="fa-solid fa-file-export"></i> JSON形式でエクスポート
                </button>
            </div>

            <h3>クラウドに保存</h3>
            <div class="util-btn-wrapper">
                <p id="auth-status-panel"></p>
                <button id="upload-btn" class="util-btn" disabled>
                    <i class="fa-solid fa-cloud-arrow-up"></i> アップロード
                </button>
                <button id="download-btn" class="util-btn">
                    <i class="fa-solid fa-cloud-arrow-down"></i> ダウンロード
                </button>
                <input type="file" id="import-file-input" accept=".json" style="display: none;">
                <button id="login-btn" class="util-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> ログイン
                </button>
                <button id="logout-btn" class="util-btn">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> ログアウト
                </button>
            </div>

            <!-- このアプリについて -->
            <div>
                <div class="about-info-wrapper">
                    <button class="about-btn" onclick="showVersion()">
                        <i class="fa-solid fa-circle-question"></i>
                        <span class="underlined">このアプリについて</span>
                    </button>
                </div>
            </div>

            <button onclick="location.reload()" class="util-btn" id="reload-btn">
                <i class="fa-solid fa-arrow-rotate-right"></i> 再読み込み
            </button>
        </div>
    </main>

    <!----- フッター ----->
    <footer id="button-container" class="button-group">
        <button id="nav-material-btn" class="footer-btn">
            <i class="fa-solid fa-book-open"></i> 教材一覧
        </button>
        <button id="nav-plan-btn" class="footer-btn active">
            <i class="fa-solid fa-calendar-check"></i> 学習予定
        </button>
        <button id="nav-option-btn" class="footer-btn">
            <i class="fa-solid fa-gear"></i> オプション
        </button>
    </footer>

    <!----- 日付変更モーダル ----->
    <div id="shift-date-modal" class="modal hidden">
        <div class="modal-container scrollable">
            <h2>予定の日付を変更</h2>
            <label>
                日付を選択：
                <!-- <select id="date-select-input"></select> -->
                <input type="date" id="date-select-input">
                <!-- セレクトボックス、デフォルトで現在の日付（設定中の値によらず）、登録されている日付（今日含む）＋明日 -->
            </label>
            <div class="modal-btns">
                <button id="cancel-shift-btn" class="cancel">キャンセル</button>
                <button id="confirm-shift-btn" class="ok">OK</button>
            </div>
        </div>
    </div>

    <!----- 教材追加・編集モーダル ----->
    <div id="add-material-modal" class="modal hidden">
        <div class="modal-container scrollable">
            <h2>教材を追加 / 編集</h2>
            <label>
                教科：
                <select id="material-subject-select">
                    <option value="math">数学</option>
                    <option value="english">英語</option>
                    <option value="modernjp">現代文</option>
                    <option value="classicjp">古典</option>
                    <option value="science">理科</option>
                    <option value="social">社会</option>
                    <option value="others">その他</option>
                </select>
            </label>
            <label>
                教材名：
                <input type="text" id="material-info" placeholder="教材名を選択">
            </label>
            <label>
                カテゴリ：
                <select id="material-category-select">
                </select>
            </label>
            <div class="modal-btns">
                <button id="cancel-material-btn" class="cancel">キャンセル</button>
                <button id="confirm-material-btn" class="ok">登録</button>
            </div>
        </div>
    </div>

    <!----- 予定追加・編集モーダル ----->
    <div id="add-plan-modal" class="modal hidden">
        <div class="modal-container">
            <div id="plan-selection-page">
                <h2>教材を選択</h2>
                <div id="plan-selection-list" class="scrollable" style="max-height: 60vh; margin-bottom: 20px;">
                    <!-- ここに動的に教材リストを生成 -->
                </div>
                <div class="modal-btns">
                    <button type="button" id="cancel-plan-btn" class="cancel">キャンセル</button>
                </div>
            </div>

            <div id="plan-input-page" class="hidden">
                <h2 id="plan-target-label">教材名</h2>
                <label>
                    範囲・内容：
                    <input type="text" id="plan-range-input" placeholder="例：p.10〜20" list="plan-range-datalist">
                    <datalist id="plan-range-datalist"></datalist>
                </label>
                <label>
                    開始時間：
                    <input type="time" id="plan-time-input" step="300">
                </label>
                <div class="modal-btns">
                    <button type="button" id="backto-plan-btn" class="cancel">戻る</button>
                    <button id="confirm-plan-btn" class="ok">確定</button>
                </div>
            </div>
        </div>
    </div>
    
    <!----- 教材並び替えモーダル ----->
    <div id="sort-material-modal" class="modal hidden">
        <div class="modal-container scrollable">
            <h2>教材の並び替え</h2>
            <div id="sort-items">
                <div class="filter-btn-wrapper">
                    <i class="fa-solid fa-tag"></i>
                    <select id="sort-category-select"></select>
                </div>
                <div id="sort-container"></div>
            </div>
            <div class="modal-btns">
                <button id="cancel-sort-btn" class="cancel">キャンセル</button>
                <button id="confirm-sort-btn" class="ok">決定</button>
            </div>
        </div>
    </div>

    <!----- 教材情報表示モーダル ----->
    <div id="info-material-modal" class="modal hidden">
        <div class="modal-container scrollable">
            <h2>教材の詳細</h2>
            <p id="material-name-panel"></p>
            <label>
                期間：
                <input type="text" id="material-date-input" placeholder="日付を入力">
            </label>
            <label>
                進度（単位：%）：
                <input type="number" id="material-progress-input" min="0" max="100" placeholder="0～100の値を入力">
            </label>
            <label>
                状態：
                <select id="material-status-select">
                    <option value="waiting">未着手</option>
                    <option value="learning">学習中</option>
                    <option value="completed">完了</option>
                </select>
            </label>
            <label>
                教材に関するメモ：
                <textarea id="material-detail-input" class="scrollable" placeholder="入力してください（改行できます）" rows="6"></textarea>
            </label>
            <div class="modal-btns">
                <button id="cancel-info-btn" class="cancel">キャンセル</button>
                <button id="confirm-info-btn" class="ok">登録</button>
            </div>
        </div>
    </div>

    <!----- カテゴリー管理モーダル ----->
    <div id="category-manage-modal" class="modal hidden">
        <div class="modal-container scrollable">
            <h2>カテゴリーの管理</h2>
            <p style="font-size:12px; color:#666; margin-bottom:12px;">
                教科名をタップすると、その教科に新しいカテゴリーを追加できます。
            </p>
            
            <div id="category-items">
                <!-- ここに教科ごとのカテゴリーカードが並ぶ -->
            </div>

            <div class="modal-btns">
                <button id="close-category-manage-btn" class="cancel">閉じる</button>
            </div>
        </div>
    </div>

    <script src="src/js/app-version.js"></script>
    <script src="src/js/fb.js" defer></script>
    <script type="module" src="src/js/sys-auth.js" defer></script>
    <script type="module" src="src/js/sys-script.js" defer></script>
</body>
</html>
